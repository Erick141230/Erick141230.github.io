<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti 🌻</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fff8dc, #ffe680);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}


.container {
    padding: 20px;
    max-width: 90%;
}


h1 {
    font-size: 2em;
    color: #b8860b;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 1.1em;
    color: #444;
    margin-top: 10px;
    animation: fadeIn 3s ease-in-out;
}


img {
    width: 80%;
    max-width: 260px;
    margin-top: 20px;
    animation: float 3s ease-in-out infinite;
}


@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}


.flower {
    position: absolute;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Estas flores son para ti 🌻</h1>
    <p>Te mando estas flores para que las puedas ver desde cualquier lado 😉</p>
    <p>Te mando muchos besos y abrazos amorcito</p>
    <p>Para la persona en la que siempre pienso 💛</p>

    <img src="flores.png" alt="flores amarillas">
</div>

<script>

function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flower");
    flor.innerHTML = "🌼";

    flor.style.left = Math.random() * 100 + "vw";
    flor.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 6000);
}


setInterval(crearFlor, 500);
</script>

</body>
</html>
